<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorority Records</title>
    <!-- Google Fonts & FontAwesome for Instagram Logo -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- THEME COLORS --- */
        :root {
            --bg-dark: #0a0a0c;
            --bg-card: #121216;
            --pink-primary: #ff4a8d;
            --pink-glow: rgba(255, 74, 141, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
        }

        /* --- GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 60px 0;
        }

        /* --- HEADER --- */
        header {
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--pink-primary);
            text-shadow: 0 0 10px var(--pink-glow);
        }

        /* --- SECTION 1: APPLY NOW --- */
        .apply-section {
            text-align: center;
            padding: 80px 0;
            background: radial-gradient(circle at center, rgba(255, 74, 141, 0.05) 0%, transparent 70%);
        }

        .cta-btn {
            display: inline-block;
            background: var(--pink-primary);
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--pink-glow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 74, 141, 0.6);
        }

        /* --- SECTION HEADINGS --- */
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title span {
            color: var(--pink-primary);
        }

        /* --- ARTIST SPOTLIGHT --- */
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .artist-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- RELEASE SPOTLIGHT --- */
        .release-section {
            background: #0f0f13;
        }

        .release-container {
            display: flex;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- FOOTER / INSTAGRAM --- */
        footer {
            padding: 60px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .footer-social {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s, transform 0.3s;
        }

        .footer-social i {
            color: var(--pink-primary);
            font-size: 2.5rem;
        }

        .footer-social:hover {
            color: var(--pink-primary);
            transform: scale(1.05);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .cta-btn { font-size: 1rem; padding: 15px 35px; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">Sorority<span>Records</span></div>
        </div>
    </header>

    <!-- Section 1: Apply Now -->
    <section class="apply-section">
        <div class="container">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfBlPUFMiwACR7XOcAzgbkRtlAOH71LHmWqkl0MVqcFpMxLXQ/viewform" target="_blank" class="cta-btn">
                Apply now thru our google form!
            </a>
        </div>
    </section>

    <!-- Section 2: Artist Spotlight -->
    <section class="artists">
        <div class="container">
            <h2 class="section-title">Artist <span>Spotlight</span></h2>
            <div class="artist-grid">
                
                <!-- Miss Vanity -->
                <div class="artist-card">
                    <iframe src="https://open.spotify.com/embed/artist/3HOT28ZcsOD2bQKJw0YNhb?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- vanessaxo -->
                <div class="artist-card">
                    <iframe src="https://open.spotify.com/embed/artist/6X4xgWORy33UsJzK0goW5v?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- Nikita Crush -->
                <div class="artist-card">
                    <iframe src="https://open.spotify.com/embed/artist/4SgwXM06S9KcLXLVwqQask?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

            </div>
        </div>
    </section>

    <!-- Section 3: Release Spotlight -->
    <section class="release-section">
        <div class="container">
            <h2 class="section-title">Release <span>Spotlight</span></h2>
            <div class="release-container">
                <!-- Displays a dynamic player showing the label's latest featured tracks/releases via the artist link -->
                <iframe src="https://open.spotify.com/embed/artist/4SgwXM06S9KcLXLVwqQask?utm_source=generator&theme=0" width="100%" height="350" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <!-- Footer: Instagram -->
    <footer>
        <div class="container">
            <a href="https://www.instagram.com/sorority.records" target="_blank" class="footer-social">
                <i class="fab fa-instagram"></i> @sorority.records
            </a>
        </div>
    </footer>

</body>
</html>
